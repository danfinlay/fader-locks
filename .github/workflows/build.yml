name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows VST3 (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFADERLOCKS_INSTALL_AFTER_BUILD=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage release folder
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Directory |
                  Where-Object { $_.Name -eq 'Fader Locks.vst3' } |
                  Select-Object -First 1
          if (-not $vst3) { throw 'Fader Locks.vst3 bundle not found under build/' }

          $stage = 'release/Fader Locks - Windows'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Copy-Item -Path $vst3.FullName -Destination $stage -Recurse
          Copy-Item -Path 'INSTALL-WINDOWS.txt' -Destination (Join-Path $stage 'INSTALL.txt')

      - name: Zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path 'release/Fader Locks - Windows' `
            -DestinationPath 'Fader Locks - Windows.zip' `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fader Locks - Windows
          path: Fader Locks - Windows.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
